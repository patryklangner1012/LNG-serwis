backend:
  name: git-gateway
  branch: main

media_folder: "public/images/posts"
public_folder: "/images/posts"

locale: pl

collections:
  - name: "posts"
    label: "Aktualności"
    folder: "src/content/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Tytuł", name: "title", widget: "string" }
      - { label: "Data", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - label: "Kategoria"
        name: "tag"
        widget: "select"
        options: ["Realizacja", "Technologia", "Interwencja", "Usługi", "Aktualność"]
      - { label: "Krótki opis (excerpt)", name: "excerpt", widget: "text" }
      - { label: "Zdjęcie główne", name: "image", widget: "image", required: false }
      - { label: "Treść", name: "body", widget: "markdown" }
